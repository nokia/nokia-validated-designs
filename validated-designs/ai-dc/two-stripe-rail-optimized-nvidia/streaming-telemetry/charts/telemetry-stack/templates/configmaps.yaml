---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  labels:
    app: telemetry-stack
data:
  datasource.yml: |-
    {{- .Files.Get "files/grafana/datasource.yml" | nindent 4 }}
  dashboards.yml: |-
    {{- .Files.Get "files/grafana/dashboards.yml" | nindent 4 }}
  node_level.json: |-
    {{- .Files.Get "files/grafana/dashboards/node_level.json" | nindent 4 }}
  dc_overview.json: |-
    {{- .Files.Get "files/grafana/dashboards/dc_overview.json" | nindent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  labels:
    app: telemetry-stack
data:
  loki-config.yml: |-
    {{- .Files.Get "files/loki/loki-config.yml" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  labels:
    app: telemetry-stack
data:
  config.alloy: |-
    {{- .Files.Get "files/alloy/config.alloy" | nindent 4 }}